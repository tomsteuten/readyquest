<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 80" role="img" aria-labelledby="title desc">
  <title id="title">Blue toothbrush</title>
  <desc id="desc">A simple child-friendly blue toothbrush with chunky bristles.</desc>
  <defs>
    <linearGradient id="handleGradient" x1="20" y1="40" x2="140" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5BC4FF"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <linearGradient id="bristleGradient" x1="0" y1="28" x2="0" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CFEFFF"/>
    </linearGradient>
  </defs>

  <rect x="18" y="30" width="122" height="20" rx="10" fill="url(#handleGradient)"/>
  <rect x="140" y="35" width="18" height="10" rx="4" fill="#2A9AF0"/>
  <rect x="158" y="28" width="38" height="24" rx="7" fill="#FFFFFF" stroke="#CFE8FF" stroke-width="2"/>

  <rect x="164" y="8" width="6" height="20" rx="3" fill="url(#bristleGradient)"/>
  <rect x="174" y="6" width="6" height="22" rx="3" fill="url(#bristleGradient)"/>
  <rect x="184" y="8" width="6" height="20" rx="3" fill="url(#bristleGradient)"/>
</svg>
